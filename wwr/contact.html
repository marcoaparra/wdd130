<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - Parra Rafting Company</title>
    <meta name="description"
        content="The purpose of this web page is to provide you options to contact the Parra Rafting Company">
    <meta name="author" content="Marco Parra">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-splash.png" alt="z-splash logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="hero">
            <h1>Parra Rafting Company</h1>
            <h2>123 Parra Street</h2>
            <h2>Nidavellir, closer from Asgard</h2>
            <h2>Phone: 999-999-9999</h2>
            <h2>Email: info@parrarafting.mx</h2>
        </div>
        <form>
            <fieldset>
                <legend>Contact Information</legend>
                <label for="fullname">Full name:</label>
                <input type="text" id="fullname" name="fullname">
                <label for="useremail">Email:</label>
                <input type="email" id="useremail" name="useremail">
            </fieldset>
            <fieldset>
                <legend>Questions</legend>
                <label for="message">Message purpose:</label>
                <input type="checkbox" id="message" name="message">
                <label for="message">General inquiry</label>
                <input type="checkbox" id="message" name="message">
                <label for="message">Reservation question</label>
                <input type="checkbox" id="message" name="message">
                <label for="message">Website Suggestion</label>
                <textarea id="message" name="message" rows="6" placeholder="Message."></textarea>
            </fieldset>
            <button type="submit">Submit Poll</button>
        </form>
        <section class="adventure">
            <h2>Adventure Awaits You!</h2>
            <figure class="miniimage">
                <img src="images/raftpack4.webp" alt="The fall of the friends cascade">
                <figcaption>Friends fall</figcaption>
            </figure>
            <figure class="miniimage">
                <img src="images/raftpack2.webp" alt="The best helmets">
                <figcaption>Best helmets</figcaption>
            </figure>
            <figure class="miniimage">
                <img src="images/raftpack3.webp" alt="The best rowings">
                <figcaption>Best rowings</figcaption>
            </figure>
            <figure class="miniimage">
                <img src="images/raftpack1.webp" alt="The best boats">
                <figcaption>Best boats</figcaption>
            </figure>
            <figure class="miniimage">
                <img src="images/raftpack5.webp" alt="The last ride rapids">
                <figcaption>Last ride rapids</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>©2025 Parra Rafting Company | Marco Parra</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/f1-1.webp" alt="Facebook logo">
            </a>
            <a href="https://linkedin.com">
                <img src="images/l1.webp" alt="LinkedIn logo">
            </a>
            <a href="https://instagram.com">
                <img src="images/i1.webp" alt="Instagram logo">
            </a>
        </nav>
    </footer>
</body>

</html>
